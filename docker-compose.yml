services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: demo-mcp-server:latest
    container_name: demo-mcp-server
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # App reads these at startup (see main.py)
      HOST: "0.0.0.0"
      PORT: "8080"
      MCP_PATH: "/"
    restart: unless-stopped
    healthcheck:
      # Uses the plain HTTP tool bridge exposed by the server
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8080/tool/add?a=1&b=1', timeout=5); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
